<!DOCTYPE html>
<html>

<head>
    <title>SmartAds - Connecting...</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0A0E27;
            color: #E0E7FF;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00D9FF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .success {
            color: #10B981;
        }

        .error {
            color: #EF4444;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p id="message">Connecting your account...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state') || '';
        const error = params.get('error');

        // State format: "platform:userId"
        const parts = state.split(':');
        const platform = parts[0] || 'unknown';
        const userId = parts.slice(1).join(':') || '';

        const msgEl = document.getElementById('message');
        const spinnerEl = document.getElementById('spinner');

        if (error) {
            spinnerEl.style.display = 'none';
            msgEl.className = 'error';
            msgEl.textContent = 'Authorization denied: ' + (params.get('error_description') || error);
            setTimeout(() => window.close(), 3000);
        } else if (code && window.opener) {
            // Send code back to parent window
            window.opener.postMessage({
                type: 'social-media-oauth-callback',
                platform: platform,
                code: code,
                userId: userId,
            }, window.location.origin);

            spinnerEl.style.display = 'none';
            msgEl.className = 'success';
            msgEl.textContent = '✅ Connected! This window will close...';
            setTimeout(() => window.close(), 1500);
        } else if (code && !window.opener) {
            // Opened in same tab (fallback)
            spinnerEl.style.display = 'none';
            msgEl.className = 'success';
            msgEl.textContent = '✅ Connected! You can close this tab and go back to SmartAds.';
        } else {
            spinnerEl.style.display = 'none';
            msgEl.className = 'error';
            msgEl.textContent = 'Something went wrong. Please close this window and try again.';
        }
    </script>
</body>

</html>
